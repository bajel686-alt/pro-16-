    <script>
        // Initial data
        const initialData = {
            users: [
                { id: 1, username: 'director', password: 'director123', role: 'director', name: 'Иванов И.И.' },
                { id: 2, username: 'admin', password: 'admin123', role: 'admin', name: 'Петрова А.С.' },
                { id: 3, username: 'teacher1', password: 'teacher123', role: 'teacher', name: 'Смирнов П.К.', teacherId: 't1' },
                { id: 4, username: 'teacher2', password: 'teacher123', role: 'teacher', name: 'Кузнецова Е.М.', teacherId: 't2' },
            ],
            classes: ['5-А', '5-Б', '6-А', '6-Б', '7-А', '7-Б', '8-А', '8-Б', '9-А', '9-Б', '10-А', '11-А'],
            subjects: ['Математика', 'Русский язык', 'Литература', 'Английский язык', 'История', 'География', 'Биология', 'Физика', 'Химия', 'Физкультура', 'Информатика', 'Обществознание'],
            timeSlots: ['08:00 - 08:45', '08:55 - 09:40', '09:50 - 10:35', '10:55 - 11:40', '11:50 - 12:35', '12:45 - 13:30', '13:40 - 14:25'],
            rooms: Array.from({length: 30}, (_, i) => (i + 1).toString()),
            teachers: [
                { id: 't1', name: 'Смирнов П.К.', subjects: ['Математика', 'Информатика'] },
                { id: 't2', name: 'Кузнецова Е.М.', subjects: ['Русский язык', 'Литература'] },
                { id: 't3', name: 'Волков А.И.', subjects: ['Английский язык'] },
                { id: 't4', name: 'Соколова М.П.', subjects: ['История', 'Обществознание'] },
                { id: 't5', name: 'Лебедев Д.С.', subjects: ['Физика'] },
            ],
            schedule: [
                { id: 1, class: '7-А', subject: 'Математика', teacherId: 't1', day: 'Понедельник', timeSlot: '08:00 - 08:45', room: '15' },
                { id: 2, class: '7-А', subject: 'Русский язык', teacherId: 't2', day: 'Понедельник', timeSlot: '08:55 - 09:40', room: '12' },
                { id: 3, class: '8-Б', subject: 'Физика', teacherId: 't5', day: 'Вторник', timeSlot: '09:50 - 10:35', room: '21' },
            ]
        };

        // State
        let data = JSON.parse(localStorage.getItem('schoolScheduleData') || JSON.stringify(initialData));
        let currentUser = null;
        let studentClass = null;
        let editingId = null;

        // Save data
        function saveData() {
            localStorage.setItem('schoolScheduleData', JSON.stringify(data));
        }

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Login
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const user = data.users.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = user;
                document.getElementById('loginError').classList.add('hidden');
                showDashboard();
            } else {
                const errorEl = document.getElementById('loginError');
                errorEl.textContent = 'Неверный логин или пароль';
                errorEl.classList.remove('hidden');
            }
        }

        // Student mode
        function showStudentMode() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('studentSelector').classList.remove('hidden');
            renderClassSelector();
        }

        function renderClassSelector() {
            const grid = document.getElementById('classGrid');
            grid.innerHTML = data.classes.map(className => 
                `<button class="class-btn mono" onclick="selectClass('${className}')">${className}</button>`
            ).join('');
        }

        function selectClass(className) {
            studentClass = className;
            document.getElementById('studentSelector').classList.add('hidden');
            document.getElementById('studentSchedule').classList.remove('hidden');
            document.getElementById('studentClassName').textContent = className;
            renderStudentSchedule();
        }

        function changeClass() {
            document.getElementById('studentSchedule').classList.add('hidden');
            document.getElementById('studentSelector').classList.remove('hidden');
            studentClass = null;
        }

        function backToLogin() {
            document.getElementById('studentSelector').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
        }

        // Render student schedule
        function renderStudentSchedule() {
            const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            const classSchedule = data.schedule.filter(item => item.class === studentClass);
            
            const content = document.getElementById('studentScheduleContent');
            
            if (classSchedule.length === 0) {
                content.innerHTML = `
                    <div class="card">
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            <h3 style="color: #475569; font-size: 22px; margin-bottom: 8px;">Расписание пока не создано</h3>
                            <p>Обратитесь к администрации школы</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = days.map(day => {
                const lessons = classSchedule
                    .filter(item => item.day === day)
                    .sort((a, b) => data.timeSlots.indexOf(a.timeSlot) - data.timeSlots.indexOf(b.timeSlot));
                
                return `
                    <div class="card day-schedule">
                        <div class="day-header">
                            <div class="day-icon">
                                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                            </div>
                            <h3>${day}</h3>
                        </div>
                        ${lessons.length === 0 ? `
                            <div class="empty-state" style="padding: 40px 20px;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 48px; height: 48px;">
                                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                                </svg>
                                <p style="font-size: 16px;">Нет уроков в этот день</p>
                            </div>
                        ` : lessons.map((lesson, index) => {
                            const teacher = data.teachers.find(t => t.id === lesson.teacherId);
                            return `
                                <div class="lesson-item">
                                    <div class="lesson-content">
                                        <div class="lesson-number">${index + 1}</div>
                                        <div class="lesson-details">
                                            <div class="detail-group">
                                                <span class="detail-label">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; vertical-align: middle; margin-right: 4px;">
                                                        <circle cx="12" cy="12" r="10"></circle>
                                                        <polyline points="12 6 12 12 16 14"></polyline>
                                                    </svg>
                                                    Время
                                                </span>
                                                <span class="detail-value mono" style="font-size: 14px;">${lesson.timeSlot}</span>
                                            </div>
                                            <div class="detail-group">
                                                <span class="detail-label">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; vertical-align: middle; margin-right: 4px;">
                                                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                                                    </svg>
                                                    Предмет
                                                </span>
                                                <span class="detail-value" style="font-size: 18px;">${lesson.subject}</span>
                                            </div>
                                            <div class="detail-group">
                                                <span class="detail-label">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; vertical-align: middle; margin-right: 4px;">
                                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                                        <circle cx="12" cy="7" r="4"></circle>
                                                    </svg>
                                                    Учитель
                                                </span>
                                                <span class="detail-value">${teacher ? teacher.name : ''}</span>
                                            </div>
                                            <div class="detail-group">
                                                <span class="detail-label">Кабинет</span>
                                                <div style="display: inline-flex; align-items: center; justify-center; padding: 4px 16px; background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); border-radius: 8px;">
                                                    <span class="mono" style="font-size: 20px; font-weight: 700; color: white;">${lesson.room}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }).join('');
        }

        // Dashboard
        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            const roleNames = {
                director: 'Директор',
                admin: 'Администратор',
                teacher: 'Учитель'
            };
            
            document.getElementById('userInfo').textContent = `${currentUser.name} • ${roleNames[currentUser.role]}`;
            
            renderTabs();
            renderTabContent('schedule');
        }

        function renderTabs() {
            const tabs = document.getElementById('tabs');
            let tabsHTML = '';
            
            if (currentUser.role === 'director') {
                tabsHTML = `
                    <button class="tab-btn active" onclick="switchTab('schedule')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        Расписание
                    </button>
                    <button class="tab-btn" onclick="switchTab('teachers')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        Учителя
                    </button>
                    <button class="tab-btn" onclick="switchTab('settings')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6m-9-9h6m6 0h6"></path>
                        </svg>
                        Настройки
                    </button>
                    <button class="tab-btn" onclick="switchTab('password')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Сменить пароль
                    </button>
                `;
            } else if (currentUser.role === 'admin') {
                tabsHTML = `
                    <button class="tab-btn active" onclick="switchTab('schedule')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        Расписание
                    </button>
                    <button class="tab-btn" onclick="switchTab('settings')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6m-9-9h6m6 0h6"></path>
                        </svg>
                        Настройки
                    </button>
                `;
            } else {
                tabsHTML = `
                    <button class="tab-btn active" onclick="switchTab('schedule')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        Моё расписание
                    </button>
                    <button class="tab-btn" onclick="switchTab('password')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Сменить пароль
                    </button>
                `;
            }
            
            tabs.innerHTML = tabsHTML;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            renderTabContent(tab);
        }

        function renderTabContent(tab) {
            const content = document.getElementById('tabContent');
            
            if (tab === 'schedule') {
                if (currentUser.role === 'teacher') {
                    renderTeacherSchedule();
                } else {
                    renderScheduleManager();
                }
            } else if (tab === 'teachers') {
                renderTeachersManager();
            } else if (tab === 'settings') {
                renderSettings();
            } else if (tab === 'password') {
                renderPasswordChanger();
            }
        }

        // Schedule Manager (for director/admin)
        function renderScheduleManager() {
            const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            const content = document.getElementById('tabContent');
            
            content.innerHTML = `
                <div class="card">
                    <div class="filters">
                        <div class="form-group" style="margin: 0;">
                            <label>Класс</label>
                            <select id="filterClass" onchange="filterSchedule()">
                                <option value="all">Все классы</option>
                                ${data.classes.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>День недели</label>
                            <select id="filterDay" onchange="filterSchedule()">
                                <option value="all">Все дни</option>
                                ${days.map(d => `<option value="${d}">${d}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="margin: 0; display: flex; align-items: flex-end;">
                            <button class="btn-add" onclick="addLesson()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                Добавить урок
                            </button>
                        </div>
                    </div>
                    <div id="scheduleList" class="schedule-list"></div>
                </div>
            `;
            
            filterSchedule();
        }

        function filterSchedule() {
            const filterClass = document.getElementById('filterClass').value;
            const filterDay = document.getElementById('filterDay').value;
            
            let filtered = data.schedule.filter(item => {
                if (filterClass !== 'all' && item.class !== filterClass) return false;
                if (filterDay !== 'all' && item.day !== filterDay) return false;
                return true;
            });
            
            const list = document.getElementById('scheduleList');
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        <p>Уроков не найдено</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(item => {
                const teacher = data.teachers.find(t => t.id === item.teacherId);
                
                if (editingId === item.id) {
                    return renderEditForm(item);
                }
                
                return `
                    <div class="schedule-item">
                        <div class="schedule-item-content">
                            <div class="schedule-details">
                                <div class="detail-group">
                                    <span class="detail-label">Класс</span>
                                    <span class="detail-value class mono">${item.class}</span>
                                </div>
                                <div class="detail-group">
                                    <span class="detail-label">Предмет</span>
                                    <span class="detail-value">${item.subject}</span>
                                </div>
                                <div class="detail-group">
                                    <span class="detail-label">Учитель</span>
                                    <span class="detail-value">${teacher ? teacher.name : ''}</span>
                                </div>
                                <div class="detail-group">
                                    <span class="detail-label">День</span>
                                    <span class="detail-value">${item.day}</span>
                                </div>
                                <div class="detail-group">
                                    <span class="detail-label">Время</span>
                                    <span class="detail-value mono">${item.timeSlot}</span>
                                </div>
                                <div class="detail-group">
                                    <span class="detail-label">Кабинет</span>
                                    <span class="detail-value room mono">${item.room}</span>
                                </div>
                            </div>
                            <div class="schedule-actions">
                                <button class="btn-icon edit" onclick="editLesson(${item.id})">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                    </svg>
                                </button>
                                ${currentUser.role === 'director' ? `
                                    <button class="btn-icon delete" onclick="deleteLesson(${item.id})">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        </svg>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderEditForm(item) {
            const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            
            return `
                <div class="schedule-item">
                    <div class="edit-form">
                        <div class="form-group" style="margin: 0;">
                            <label>Класс</label>
                            <select id="edit_class">
                                ${data.classes.map(c => `<option value="${c}" ${c === item.class ? 'selected' : ''}>${c}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Предмет</label>
                            <select id="edit_subject">
                                ${data.subjects.map(s => `<option value="${s}" ${s === item.subject ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Учитель</label>
                            <select id="edit_teacher">
                                ${data.teachers.map(t => `<option value="${t.id}" ${t.id === item.teacherId ? 'selected' : ''}>${t.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>День</label>
                            <select id="edit_day">
                                ${days.map(d => `<option value="${d}" ${d === item.day ? 'selected' : ''}>${d}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Время</label>
                            <select id="edit_time">
                                ${data.timeSlots.map(t => `<option value="${t}" ${t === item.timeSlot ? 'selected' : ''}>${t}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Кабинет</label>
                            <select id="edit_room">
                                ${data.rooms.map(r => `<option value="${r}" ${r === item.room ? 'selected' : ''}>${r}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-actions">
                            <button class="btn-save" onclick="saveLesson()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                Сохранить
                            </button>
                            <button class="btn-cancel" onclick="cancelEdit()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                                Отмена
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function addLesson() {
            const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            const newLesson = {
                id: Date.now(),
                class: data.classes[0],
                subject: data.subjects[0],
                teacherId: data.teachers[0].id,
                day: days[0],
                timeSlot: data.timeSlots[0],
                room: data.rooms[0]
            };
            
            data.schedule.push(newLesson);
            saveData();
            editingId = newLesson.id;
            filterSchedule();
        }

        function editLesson(id) {
            editingId = id;
            filterSchedule();
        }

        function saveLesson() {
            const index = data.schedule.findIndex(item => item.id === editingId);
            if (index !== -1) {
                data.schedule[index] = {
                    ...data.schedule[index],
                    class: document.getElementById('edit_class').value,
                    subject: document.getElementById('edit_subject').value,
                    teacherId: document.getElementById('edit_teacher').value,
                    day: document.getElementById('edit_day').value,
                    timeSlot: document.getElementById('edit_time').value,
                    room: document.getElementById('edit_room').value
                };
                saveData();
            }
            editingId = null;
            filterSchedule();
        }

        function cancelEdit() {
            editingId = null;
            filterSchedule();
        }

        function deleteLesson(id) {
            if (confirm('Удалить урок?')) {
                data.schedule = data.schedule.filter(item => item.id !== id);
                saveData();
                filterSchedule();
            }
        }

        // Teacher Schedule (read-only for teacher, editable time/room)
        function renderTeacherSchedule() {
            const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            const teacherSchedule = data.schedule.filter(item => item.teacherId === currentUser.teacherId);
            
            const content = document.getElementById('tabContent');
            
            content.innerHTML = days.map(day => {
                const lessons = teacherSchedule
                    .filter(item => item.day === day)
                    .sort((a, b) => data.timeSlots.indexOf(a.timeSlot) - data.timeSlots.indexOf(b.timeSlot));
                
                return `
                    <div class="card day-schedule">
                        <div class="day-header">
                            <div class="day-icon">
                                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                            </div>
                            <h3 style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${day}</h3>
                        </div>
                        ${lessons.length === 0 ? `
                            <div class="empty-state" style="padding: 40px 20px;">
                                <p style="font-size: 16px; color: #94a3b8;">Нет уроков</p>
                            </div>
                        ` : `
                            <div class="schedule-list">
                                ${lessons.map(lesson => {
                                    if (editingId === lesson.id) {
                                        return `
                                            <div class="schedule-item">
                                                <div class="edit-form" style="grid-template-columns: 1fr 1fr;">
                                                    <div class="form-group" style="margin: 0;">
                                                        <label>Время</label>
                                                        <select id="edit_time">
                                                            ${data.timeSlots.map(t => `<option value="${t}" ${t === lesson.timeSlot ? 'selected' : ''}>${t}</option>`).join('')}
                                                        </select>
                                                    </div>
                                                    <div class="form-group" style="margin: 0;">
                                                        <label>Кабинет</label>
                                                        <select id="edit_room">
                                                            ${data.rooms.map(r => `<option value="${r}" ${r === lesson.room ? 'selected' : ''}>${r}</option>`).join('')}
                                                        </select>
                                                    </div>
                                                    <div class="form-actions">
                                                        <button class="btn-save" onclick="saveTeacherLesson()">
                                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                                <polyline points="20 6 9 17 4 12"></polyline>
                                                            </svg>
                                                            Сохранить
                                                        </button>
                                                        <button class="btn-cancel" onclick="cancelTeacherEdit()">
                                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                                                <line x1="6" y1="6" x2="18" y2="18"></line>
                                                            </svg>
                                                            Отмена
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        `;
                                    }
                                    
                                    return `
                                        <div class="schedule-item">
                                            <div class="schedule-item-content">
                                                <div class="schedule-details" style="grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));">
                                                    <div class="detail-group">
                                                        <span class="detail-label">Время</span>
                                                        <span class="detail-value mono">${lesson.timeSlot}</span>
                                                    </div>
                                                    <div class="detail-group">
                                                        <span class="detail-label">Класс</span>
                                                        <span class="detail-value class mono">${lesson.class}</span>
                                                    </div>
                                                    <div class="detail-group">
                                                        <span class="detail-label">Предмет</span>
                                                        <span class="detail-value">${lesson.subject}</span>
                                                    </div>
                                                    <div class="detail-group">
                                                        <span class="detail-label">Кабинет</span>
                                                        <span class="detail-value room mono">${lesson.room}</span>
                                                    </div>
                                                </div>
                                                <div class="schedule-actions">
                                                    <button class="btn-icon edit" onclick="editTeacherLesson(${lesson.id})">
                                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `}
                    </div>
                `;
            }).join('');
        }

        function editTeacherLesson(id) {
            editingId = id;
            renderTeacherSchedule();
        }

        function saveTeacherLesson() {
            const index = data.schedule.findIndex(item => item.id === editingId);
            if (index !== -1) {
                data.schedule[index] = {
                    ...data.schedule[index],
                    timeSlot: document.getElementById('edit_time').value,
                    room: document.getElementById('edit_room').value
                };
                saveData();
            }
            editingId = null;
            renderTeacherSchedule();
        }

        function cancelTeacherEdit() {
            editingId = null;
            renderTeacherSchedule();
        }

        // Teachers Manager
        function renderTeachersManager() {
            const content = document.getElementById('tabContent');
            const teachers = data.users.filter(u => u.role === 'teacher');
            
            content.innerHTML = `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="margin: 0;">Учителя</h2>
                        <button class="btn-add" onclick="toggleNewTeacherForm()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="8.5" cy="7" r="4"></circle>
                                <line x1="20" y1="8" x2="20" y2="14"></line>
                                <line x1="23" y1="11" x2="17" y2="11"></line>
                            </svg>
                            Добавить учителя
                        </button>
                    </div>
                    
                    <div id="newTeacherForm" class="new-teacher-form hidden">
                        <h3>Новый учитель</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="form-group" style="margin: 0;">
                                <label>ФИО</label>
                                <input type="text" id="new_teacher_name" placeholder="Иванов И.И.">
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label>Логин</label>
                                <input type="text" id="new_teacher_login" placeholder="teacher_login">
                            </div>
                            <div class="form-group" style="margin: 0;">
                                <label>Пароль</label>
                                <input type="text" id="new_teacher_password" placeholder="password">
                            </div>
                            <div style="display: flex; align-items: flex-end; gap: 8px;">
                                <button class="btn-save" style="flex: 1;" onclick="addTeacher()">Создать</button>
                                <button class="btn-cancel" onclick="toggleNewTeacherForm()">Отмена</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="schedule-list">
                        ${teachers.map(teacher => `
                            <div class="teacher-item">
                                <div class="teacher-info">
                                    <h4>${teacher.name}</h4>
                                    <p>Логин: <span class="mono" style="font-weight: 600;">${teacher.username}</span></p>
                                </div>
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn-icon delete" onclick="deleteTeacher(${teacher.id})">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function toggleNewTeacherForm() {
            const form = document.getElementById('newTeacherForm');
            form.classList.toggle('hidden');
        }

        function addTeacher() {
            const name = document.getElementById('new_teacher_name').value;
            const login = document.getElementById('new_teacher_login').value;
            const password = document.getElementById('new_teacher_password').value;
            
            if (!name || !login || !password) {
                alert('Заполните все поля');
                return;
            }
            
            const newTeacherId = 't' + (data.teachers.length + 1);
            const newUserId = Math.max(...data.users.map(u => u.id)) + 1;
            
            data.users.push({
                id: newUserId,
                username: login,
                password: password,
                role: 'teacher',
                name: name,
                teacherId: newTeacherId
            });
            
            data.teachers.push({
                id: newTeacherId,
                name: name,
                subjects: []
            });
            
            saveData();
            
            document.getElementById('new_teacher_name').value = '';
            document.getElementById('new_teacher_login').value = '';
            document.getElementById('new_teacher_password').value = '';
            
            toggleNewTeacherForm();
            renderTeachersManager();
        }

        function deleteTeacher(id) {
            if (confirm('Удалить учителя и все его уроки?')) {
                const teacher = data.users.find(u => u.id === id);
                data.users = data.users.filter(u => u.id !== id);
                data.teachers = data.teachers.filter(t => t.id !== teacher.teacherId);
                data.schedule = data.schedule.filter(s => s.teacherId !== teacher.teacherId);
                saveData();
                renderTeachersManager();
            }
        }

        // Settings
        function renderSettings() {
            const content = document.getElementById('tabContent');
            
            content.innerHTML = `
                <div class="card">
                    <h2>Классы</h2>
                    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                        <input type="text" id="new_class" placeholder="Например: 11-Б" style="flex: 1;">
                        <button class="btn-add" onclick="addClass()" style="width: auto;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="tag-container">
                        ${data.classes.map(c => `
                            <div class="tag class">
                                <span class="mono" style="font-weight: 700;">${c}</span>
                                <button onclick="deleteClass('${c}')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="card">
                    <h2>Предметы</h2>
                    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                        <input type="text" id="new_subject" placeholder="Название предмета" style="flex: 1;">
                        <button class="btn-add" onclick="addSubject()" style="width: auto;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="tag-container">
                        ${data.subjects.map(s => `
                            <div class="tag subject">
                                <span style="font-weight: 600;">${s}</span>
                                <button onclick="deleteSubject('${s}')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="card">
                    <h2>Время уроков</h2>
                    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                        <input type="text" id="new_time" placeholder="Например: 14:35 - 15:20" style="flex: 1;">
                        <button class="btn-add" onclick="addTimeSlot()" style="width: auto;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="tag-container">
                        ${data.timeSlots.map((t, idx) => `
                            <div class="tag time">
                                <span style="font-weight: 700; margin-right: 8px;">${idx + 1}</span>
                                <span class="mono" style="font-weight: 600;">${t}</span>
                                <button onclick="deleteTimeSlot('${t}')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function addClass() {
            const value = document.getElementById('new_class').value.trim();
            if (value && !data.classes.includes(value)) {
                data.classes.push(value);
                data.classes.sort();
                saveData();
                renderSettings();
            }
        }

        function deleteClass(className) {
            if (confirm(`Удалить класс ${className}?`)) {
                data.classes = data.classes.filter(c => c !== className);
                data.schedule = data.schedule.filter(s => s.class !== className);
                saveData();
                renderSettings();
            }
        }

        function addSubject() {
            const value = document.getElementById('new_subject').value.trim();
            if (value && !data.subjects.includes(value)) {
                data.subjects.push(value);
                data.subjects.sort();
                saveData();
                renderSettings();
            }
        }

        function deleteSubject(subject) {
            if (confirm(`Удалить предмет ${subject}?`)) {
                data.subjects = data.subjects.filter(s => s !== subject);
                data.schedule = data.schedule.filter(s => s.subject !== subject);
                saveData();
                renderSettings();
            }
        }

        function addTimeSlot() {
            const value = document.getElementById('new_time').value.trim();
            if (value && !data.timeSlots.includes(value)) {
                data.timeSlots.push(value);
                saveData();
                renderSettings();
            }
        }

        function deleteTimeSlot(timeSlot) {
            if (confirm(`Удалить время ${timeSlot}?`)) {
                data.timeSlots = data.timeSlots.filter(t => t !== timeSlot);
                data.schedule = data.schedule.filter(s => s.timeSlot !== timeSlot);
                saveData();
                renderSettings();
            }
        }

        // Password Changer
        function renderPasswordChanger() {
            const content = document.getElementById('tabContent');
            
            content.innerHTML = `
                <div class="card password-form">
                    <h2>Смена пароля</h2>
                    
                    <div id="passwordMessage" class="hidden"></div>
                    
                    <form onsubmit="changePassword(event)">
                        <div class="form-group">
                            <label>Старый пароль</label>
                            <input type="password" id="old_password" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Новый пароль</label>
                            <input type="password" id="new_password" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Подтвердите пароль</label>
                            <input type="password" id="confirm_password" required>
                        </div>
                        
                        <button type="submit" class="btn-login">Изменить пароль</button>
                    </form>
                </div>
            `;
        }

        function changePassword(event) {
            event.preventDefault();
            
            const oldPassword = document.getElementById('old_password').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            const messageEl = document.getElementById('passwordMessage');
            
            if (oldPassword !== currentUser.password) {
                messageEl.className = 'error-message';
                messageEl.textContent = 'Неверный старый пароль';
                messageEl.classList.remove('hidden');
                return;
            }
            
            if (newPassword.length < 6) {
                messageEl.className = 'error-message';
                messageEl.textContent = 'Пароль должен быть минимум 6 символов';
                messageEl.classList.remove('hidden');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                messageEl.className = 'error-message';
                messageEl.textContent = 'Пароли не совпадают';
                messageEl.classList.remove('hidden');
                return;
            }
            
            const userIndex = data.users.findIndex(u => u.id === currentUser.id);
            data.users[userIndex].password = newPassword;
            currentUser.password = newPassword;
            saveData();
            
            messageEl.className = 'success-message';
            messageEl.textContent = 'Пароль успешно изменён';
            messageEl.classList.remove('hidden');
            
            document.getElementById('old_password').value = '';
            document.getElementById('new_password').value = '';
            document.getElementById('confirm_password').value = '';
            
            setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 3000);
        }

        // Logout
        function logout() {
            currentUser = null;
            studentClass = null;
            editingId = null;
            
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('studentSchedule').classList.add('hidden');
            document.getElementById('studentSelector').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Школьное расписание загружено');
        });
    </script>
</body>
</html>
